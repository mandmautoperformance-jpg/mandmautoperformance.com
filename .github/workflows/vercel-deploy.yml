name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      gemini_api_key:
        description: 'GEMINI_API_KEY (optional — leave blank if already set in Vercel dashboard)'
        required: false
        type: string
      supabase_url:
        description: 'NEXT_PUBLIC_SUPABASE_URL (optional)'
        required: false
        type: string
      supabase_anon_key:
        description: 'NEXT_PUBLIC_SUPABASE_ANON_KEY (optional)'
        required: false
        type: string
      supabase_service_role_key:
        description: 'SUPABASE_SERVICE_ROLE_KEY (optional)'
        required: false
        type: string
      site_url:
        description: 'NEXT_PUBLIC_SITE_URL (optional)'
        required: false
        type: string
      resend_api_key:
        description: 'RESEND_API_KEY (optional — enables booking/contact email notifications)'
        required: false
        type: string
      mail_from:
        description: 'MAIL_FROM (optional — verified sender, e.g. "M&M Auto Performance <bookings@mandmautoperformance.com>")'
        required: false
        type: string
      admin_notify_email:
        description: 'ADMIN_NOTIFY_EMAIL (optional — where booking notifications go; defaults to mandmautoperformance@gmail.com)'
        required: false
        type: string
      supabase_access_token:
        description: 'SUPABASE_ACCESS_TOKEN (sbp_… personal access token — runner auto-fetches anon + service_role keys)'
        required: false
        type: string
      supabase_ref:
        description: 'Supabase project ref (e.g. ratyazffxlppzurfokxp) — required when using the access token'
        required: false
        type: string
      resend_domain:
        description: 'Register this sending domain with Resend and print its DNS records (e.g. mandmautoperformance.com)'
        required: false
        type: string
      configure_vercel_dns:
        description: 'Write the Resend DKIM/SPF/MX records into Vercel DNS automatically (true/false). Use when the domain runs on Vercel nameservers.'
        required: false
        type: string
      run_email_test:
        description: 'After deploy, send a branded test email to the business inbox and print the result (true/false)'
        required: false
        type: string
      email_test_token:
        description: 'EMAIL_TEST_TOKEN — only needed if the self-test endpoint is token-gated'
        required: false
        type: string
      configure_supabase:
        description: 'Route Supabase auth emails through Resend SMTP + apply pending DB migrations (true/false)'
        required: false
        type: string
      smtp_sender_email:
        description: 'SMTP sender (verified Resend sender). Default onboarding@resend.dev works immediately.'
        required: false
        type: string
      smtp_mode:
        description: 'builtin = revert to Supabase built-in mailer (delivers to everyone). resend = custom Resend SMTP. Default resend.'
        required: false
        type: string
      signup_probe:
        description: 'After config, fire a live signup to a test address and assert it is accepted (true/false)'
        required: false
        type: string
      probe_email:
        description: 'Base email for the signup probe (a +run-id tag is appended for uniqueness). Use a REAL deliverable inbox, e.g. yourbusiness+probe@gmail.com.'
        required: false
        type: string
      admin_emails:
        description: 'ADMIN_EMAILS — comma-separated allowlist that unlocks /admin-dashboard + /api/admin/*'
        required: false
        type: string
      stripe_secret_key:
        description: 'STRIPE_SECRET_KEY (sk_test_… or sk_live_…)'
        required: false
        type: string
      stripe_webhook_secret:
        description: 'STRIPE_WEBHOOK_SECRET (whsec_…)'
        required: false
        type: string
      configure_stripe:
        description: 'Auto-create the Stripe webhook endpoint and inject its signing secret (true/false)'
        required: false
        type: string
      autoflip_branded:
        description: 'If the Resend domain is verified, switch Supabase auth email to the branded sender (bookings@…) automatically (true/false)'
        required: false
        type: string
      verify_live:
        description: 'After deploy, hit the live site to confirm MIA (Gemini) and key endpoints respond (true/false)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Report which secrets are actually present in the vault (names only,
      # never values) so we can diagnose missing keys without guessing.
      - name: Vault check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          chk() { if [ -n "${!1}" ]; then echo "  ✓ $1 present"; else echo "  ✗ $1 MISSING"; fi; }
          echo "===== VAULT SECRETS (names only) ====="
          chk GEMINI_API_KEY
          chk STRIPE_SECRET_KEY
          chk STRIPE_WEBHOOK_SECRET
          chk RESEND_API_KEY
          chk SUPABASE_ACCESS_TOKEN
          chk VERCEL_TOKEN
          echo "======================================"

      # Route Supabase Auth emails (confirmation, password reset) through the
      # Resend SMTP server instead of Supabase's shared mailer, and apply the
      # account-ID-verification migration. Both go through the Management API —
      # no dashboard clicking. Idempotent; runs only when configure_supabase=true.
      - name: Configure Supabase (SMTP + migrations)
        if: ${{ inputs.configure_supabase == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || inputs.supabase_access_token }}
          SUPABASE_REF: ${{ secrets.SUPABASE_REF || inputs.supabase_ref || 'ratyazffxlppzurfokxp' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || inputs.resend_api_key }}
          SENDER_EMAIL: ${{ inputs.smtp_sender_email }}
          SMTP_MODE: ${{ inputs.smtp_mode }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ERROR: no SUPABASE_ACCESS_TOKEN (secret or input)."; exit 1
          fi
          echo "::add-mask::$SUPABASE_ACCESS_TOKEN"
          [ -n "$RESEND_API_KEY" ] && echo "::add-mask::$RESEND_API_KEY"
          SMTP_MODE="${SMTP_MODE:-resend}"

          if [ "$SMTP_MODE" = "builtin" ]; then
            # Revert to Supabase's built-in mailer: it delivers to ANY recipient
            # (unlike Resend's onboarding@resend.dev test sender, which only
            # reaches the account owner). Clears custom SMTP + lifts the 2/hr cap.
            echo "→ Reverting Supabase Auth to the BUILT-IN mailer (delivers to everyone)…"
            # Minimal payload: null ONLY the custom-SMTP credential fields so GoTrue
            # falls back to the built-in mailer. Do NOT send smtp_sender_name or
            # rate_limit_email_sent here — the API rejects those unless custom SMTP
            # is active (HTTP 401), and "" on an email field fails validation (400).
            SMTP_PAYLOAD=$(jq -n '{
              external_email_enabled: true,
              smtp_host: null,
              smtp_user: null,
              smtp_pass: null,
              smtp_admin_email: null
            }')
          else
            if [ -z "$RESEND_API_KEY" ]; then
              echo "ERROR: no RESEND_API_KEY (secret or input) — needed as the SMTP password."; exit 1
            fi
            SENDER_EMAIL="${SENDER_EMAIL:-onboarding@resend.dev}"
            echo "→ Pointing Supabase Auth SMTP at smtp.resend.com (sender: $SENDER_EMAIL)…"
            SMTP_PAYLOAD=$(jq -n \
              --arg pass "$RESEND_API_KEY" --arg email "$SENDER_EMAIL" \
              '{
                external_email_enabled: true,
                smtp_admin_email: $email,
                smtp_host: "smtp.resend.com",
                smtp_port: "465",
                smtp_user: "resend",
                smtp_pass: $pass,
                smtp_sender_name: "M&M Auto Performance",
                smtp_max_frequency: 5,
                rate_limit_email_sent: 30
              }')
          fi
          SMTP_RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X PATCH \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" -d "$SMTP_PAYLOAD" \
            "https://api.supabase.com/v1/projects/$SUPABASE_REF/config/auth")
          SMTP_CODE=$(echo "$SMTP_RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          if [ "$SMTP_CODE" = "200" ]; then
            echo "✓ Auth email config updated (mode: $SMTP_MODE)."
            echo "  now smtp_host=$(echo "$SMTP_RESP" | sed 's/HTTP_STATUS:[0-9]*//' | jq -r '.smtp_host // "(built-in)"')"
          else
            echo "✗ SMTP config failed (HTTP $SMTP_CODE):"
            echo "$SMTP_RESP" | sed 's/HTTP_STATUS:[0-9]*//' | head -c 600; exit 1
          fi

          echo "→ Applying migration 005 (user_id_uploads + storage bucket)…"
          MIG_PAYLOAD=$(jq -Rs '{query: .}' < supabase/migrations/005_account_id_verification.sql)
          MIG_RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" -d "$MIG_PAYLOAD" \
            "https://api.supabase.com/v1/projects/$SUPABASE_REF/database/query")
          MIG_CODE=$(echo "$MIG_RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          if [ "$MIG_CODE" = "200" ] || [ "$MIG_CODE" = "201" ]; then
            echo "✓ Migration applied — ID upload flow has its table."
          else
            echo "✗ Migration failed (HTTP $MIG_CODE):"
            echo "$MIG_RESP" | sed 's/HTTP_STATUS:[0-9]*//' | head -c 600; exit 1
          fi

          # Ensure the contact form has its table. The initial-schema migration
          # (which is the only place contact_messages is defined) may never have
          # been applied to this project, so the public /contact form 500s on
          # insert. This block is fully idempotent — safe to run every deploy.
          echo "→ Ensuring contact_messages table + RLS exist…"
          CONTACT_SQL='create table if not exists public.contact_messages (
            id         uuid primary key default gen_random_uuid(),
            name       text not null,
            email      text not null,
            subject    text not null,
            message    text not null,
            status     text not null default '"'"'unread'"'"' check (status in ('"'"'unread'"'"', '"'"'read'"'"', '"'"'replied'"'"')),
            created_at timestamptz not null default now()
          );
          alter table public.contact_messages enable row level security;
          drop policy if exists "service role manages contact messages" on public.contact_messages;
          create policy "service role manages contact messages"
            on public.contact_messages for all using (auth.role() = '"'"'service_role'"'"');
          drop policy if exists "anyone can submit contact form" on public.contact_messages;
          create policy "anyone can submit contact form"
            on public.contact_messages for insert with check (true);'
          CONTACT_PAYLOAD=$(jq -n --arg q "$CONTACT_SQL" '{query: $q}')
          CONTACT_RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" -d "$CONTACT_PAYLOAD" \
            "https://api.supabase.com/v1/projects/$SUPABASE_REF/database/query")
          CONTACT_CODE=$(echo "$CONTACT_RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          if [ "$CONTACT_CODE" = "200" ] || [ "$CONTACT_CODE" = "201" ]; then
            echo "✓ contact_messages table ready — the contact form can save."
          else
            echo "✗ contact_messages ensure failed (HTTP $CONTACT_CODE):"
            echo "$CONTACT_RESP" | sed 's/HTTP_STATUS:[0-9]*//' | head -c 600; exit 1
          fi

          # War Room deal pipeline. Idempotent — safe to run every deploy.
          echo "→ Ensuring war_room_deals table + RLS exist…"
          WR_SQL='create table if not exists public.war_room_deals (
            id                     uuid primary key default gen_random_uuid(),
            asset_class            text not null,
            title                  text not null,
            location               text,
            asking_price_pence     bigint,
            target_buy_pence       bigint,
            resale_pence           bigint,
            projected_profit_pence bigint,
            stage                  text not null default '"'"'sourced'"'"',
            analysis               jsonb not null default '"'"'{}'"'"'::jsonb,
            created_at             timestamptz not null default now(),
            updated_at             timestamptz not null default now()
          );
          alter table public.war_room_deals drop constraint if exists war_room_deals_asset_class_check;
          alter table public.war_room_deals add constraint war_room_deals_asset_class_check check (asset_class in ('"'"'land'"'"', '"'"'car'"'"', '"'"'stock'"'"', '"'"'gold'"'"'));
          alter table public.war_room_deals drop constraint if exists war_room_deals_stage_check;
          alter table public.war_room_deals add constraint war_room_deals_stage_check check (stage in ('"'"'sourced'"'"', '"'"'offer_sent'"'"', '"'"'negotiating'"'"', '"'"'buyer_matched'"'"', '"'"'closed'"'"', '"'"'passed'"'"', '"'"'watching'"'"', '"'"'entered'"'"', '"'"'holding'"'"', '"'"'exited'"'"'));
          alter table public.war_room_deals enable row level security;
          drop policy if exists "service role manages war room deals" on public.war_room_deals;
          create policy "service role manages war room deals"
            on public.war_room_deals for all using (auth.role() = '"'"'service_role'"'"');'
          WR_PAYLOAD=$(jq -n --arg q "$WR_SQL" '{query: $q}')
          WR_RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" -d "$WR_PAYLOAD" \
            "https://api.supabase.com/v1/projects/$SUPABASE_REF/database/query")
          WR_CODE=$(echo "$WR_RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          if [ "$WR_CODE" = "200" ] || [ "$WR_CODE" = "201" ]; then
            echo "✓ war_room_deals table ready — the War Room pipeline can save."
          else
            echo "✗ war_room_deals ensure failed (HTTP $WR_CODE):"
            echo "$WR_RESP" | sed 's/HTTP_STATUS:[0-9]*//' | head -c 600; exit 1
          fi

      # Definitive proof: fire a REAL signup at the live Supabase auth API using a
      # non-owner test address. With the broken onboarding@resend.dev sender this
      # returns HTTP 500 "Error sending confirmation email"; once email delivers
      # to everyone it returns 200. Uses an @example.com address so no real inbox
      # is touched — we only care whether GoTrue accepts + dispatches the email.
      - name: Live signup probe
        if: ${{ inputs.signup_probe == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || inputs.supabase_access_token }}
          SUPABASE_REF: ${{ secrets.SUPABASE_REF || inputs.supabase_ref || 'ratyazffxlppzurfokxp' }}
          PROBE_EMAIL: ${{ inputs.probe_email }}
        run: |
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && { echo "ERROR: no SUPABASE_ACCESS_TOKEN."; exit 1; }
          echo "::add-mask::$SUPABASE_ACCESS_TOKEN"
          # Resolve the anon (public) key — needed as the apikey for the auth API.
          KEYS=$(curl -sS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" "https://api.supabase.com/v1/projects/$SUPABASE_REF/api-keys")
          ANON=$(echo "$KEYS" | jq -r '.[]? | select(.name=="anon") | .api_key' | head -1)
          if [ -z "$ANON" ] || [ "$ANON" = "null" ]; then
            ANON=$(echo "$KEYS" | jq -r '.[]? | select((.tags // "")|test("anon")) | .api_key' | head -1)
          fi
          if [ -z "$ANON" ] || [ "$ANON" = "null" ]; then echo "ERROR: could not resolve anon key. Raw:"; echo "$KEYS" | head -c 300; exit 1; fi
          echo "::add-mask::$ANON"
          # Build a UNIQUE, DELIVERABLE probe address. example.com is a null-MX
          # black hole that rejects mail synchronously (false 500), so a real
          # inbox must be supplied via probe_email; a +run-id tag keeps it unique.
          BASE="${PROBE_EMAIL:-mm-probe@example.com}"
          PLOCAL="${BASE%@*}"; PDOMAIN="${BASE#*@}"
          PROBE="${PLOCAL}+r${GITHUB_RUN_ID}@${PDOMAIN}"
          echo "→ Signing up a live test address: $PROBE"
          RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "apikey: $ANON" -H "Authorization: Bearer $ANON" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$PROBE\",\"password\":\"Probe-$(printf '%s' "$GITHUB_RUN_ID" | tail -c 8)-Aa1!\"}" \
            "https://${SUPABASE_REF}.supabase.co/auth/v1/signup")
          CODE=$(echo "$RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          BODY=$(echo "$RESP" | sed 's/HTTP_STATUS:[0-9]*//')
          echo "SIGNUP_HTTP=$CODE"
          echo "SIGNUP_BODY=$(echo "$BODY" | head -c 400)"
          if [ "$CODE" = "200" ] || [ "$CODE" = "201" ]; then
            echo "✓✓✓ SIGNUP ACCEPTED — confirmation email dispatched to a non-owner address. Strangers can sign up."
          elif echo "$BODY" | grep -qi 'already registered\|already been registered'; then
            echo "✓ Email accepted previously (already registered) — the send path works."
          else
            echo "✗✗✗ SIGNUP STILL FAILING (HTTP $CODE) — email send path is broken."
            exit 1
          fi

      # Watch the Resend sending domain and, the moment Amazon SES flips it to
      # "verified", switch Supabase auth email to the branded sender (bookings@…)
      # with a lifted rate limit. Until then it leaves the working built-in mailer
      # untouched. Idempotent — safe to run on a schedule until it succeeds.
      - name: Auto-flip to branded sender
        if: ${{ inputs.autoflip_branded == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || inputs.supabase_access_token }}
          SUPABASE_REF: ${{ secrets.SUPABASE_REF || inputs.supabase_ref || 'ratyazffxlppzurfokxp' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || inputs.resend_api_key }}
          DOMAIN: ${{ inputs.resend_domain }}
          SENDER: 'bookings@mandmautoperformance.com'
        run: |
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && { echo "ERROR: no SUPABASE_ACCESS_TOKEN."; exit 1; }
          [ -z "$RESEND_API_KEY" ] && { echo "ERROR: no RESEND_API_KEY."; exit 1; }
          [ -z "$DOMAIN" ] && DOMAIN="mandmautoperformance.com"
          [ -z "$SENDER" ] && SENDER="bookings@mandmautoperformance.com"
          echo "::add-mask::$SUPABASE_ACCESS_TOKEN"; echo "::add-mask::$RESEND_API_KEY"
          rapi() { curl -sS -H "Authorization: Bearer $RESEND_API_KEY" -H "Content-Type: application/json" "$@"; }

          RID=$(rapi "https://api.resend.com/domains" | jq -r --arg d "$DOMAIN" '.data[]? | select(.name==$d) | .id' | head -1)
          rapi -X POST "https://api.resend.com/domains/$RID/verify" >/dev/null || true
          STATUS=$(rapi "https://api.resend.com/domains/$RID" | jq -r '.status')
          echo "RESEND_DOMAIN_STATUS=$STATUS"

          if [ "$STATUS" != "verified" ]; then
            echo "→ Domain not verified yet (status: $STATUS). Leaving the built-in mailer in place. No change."
            exit 0
          fi

          echo "✓ Domain VERIFIED — switching Supabase auth email to the branded sender: $SENDER"
          PAYLOAD=$(jq -n --arg pass "$RESEND_API_KEY" --arg email "$SENDER" '{
            external_email_enabled: true,
            smtp_admin_email: $email,
            smtp_host: "smtp.resend.com",
            smtp_port: "465",
            smtp_user: "resend",
            smtp_pass: $pass,
            smtp_sender_name: "M&M Auto Performance",
            smtp_max_frequency: 5,
            rate_limit_email_sent: 100
          }')
          RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X PATCH \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" -d "$PAYLOAD" \
            "https://api.supabase.com/v1/projects/$SUPABASE_REF/config/auth")
          CODE=$(echo "$RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          if [ "$CODE" = "200" ]; then
            echo "✓✓✓ FLIPPED — auth emails now send from $SENDER (branded, rate limit 100/hr)."
          else
            echo "✗ Flip failed (HTTP $CODE): $(echo "$RESP" | sed 's/HTTP_STATUS:[0-9]*//' | head -c 400)"; exit 1
          fi

      # Auto-provision the Stripe webhook endpoint using the secret key already in
      # the vault, and capture its signing secret (whsec_) so payments verify.
      # Runs before the deploy so the secret can be injected into the build.
      # The signing secret is only returned by Stripe on CREATE, so we remove any
      # existing endpoint for this URL first, then recreate to capture a fresh one.
      - name: Configure Stripe webhook
        if: ${{ inputs.configure_stripe == 'true' }}
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || inputs.stripe_secret_key }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "⚠ Skipping Stripe webhook — STRIPE_SECRET_KEY is not in the vault."
            echo "  Add it at the repo's Actions secrets, then re-run with configure_stripe=true."
            exit 0
          fi
          echo "::add-mask::$STRIPE_SECRET_KEY"
          URL="https://mandmautoperformance.com/api/payments/webhook"

          echo "→ Looking for an existing webhook for $URL …"
          LIST=$(curl -sS https://api.stripe.com/v1/webhook_endpoints -u "$STRIPE_SECRET_KEY:")
          EXISTING=$(echo "$LIST" | jq -r --arg u "$URL" '.data[]? | select(.url==$u) | .id')
          for id in $EXISTING; do
            echo "  removing old endpoint $id (so we can capture a fresh signing secret)…"
            curl -sS -X DELETE "https://api.stripe.com/v1/webhook_endpoints/$id" -u "$STRIPE_SECRET_KEY:" >/dev/null || true
          done

          echo "→ Creating webhook endpoint…"
          CREATE=$(curl -sS https://api.stripe.com/v1/webhook_endpoints -u "$STRIPE_SECRET_KEY:" \
            -d "url=$URL" \
            -d "enabled_events[]=checkout.session.completed" \
            -d "enabled_events[]=payment_intent.succeeded")
          WHSEC=$(echo "$CREATE" | jq -r '.secret // empty')
          if [ -z "$WHSEC" ]; then
            echo "✗ Could not create webhook. Stripe said:"
            echo "$CREATE" | jq -r '.error.message // .' | head -c 500; exit 1
          fi
          echo "::add-mask::$WHSEC"
          # Hand the secret to the deploy step (different name avoids clobbering the
          # YAML env expression, which would otherwise overwrite it with empty).
          echo "STRIPE_WEBHOOK_SECRET_RESOLVED=$WHSEC" >> "$GITHUB_ENV"
          echo "✓ Stripe webhook live: $URL (events: checkout.session.completed, payment_intent.succeeded)"

      # Optional: register a sending domain with Resend and print the SPF/DKIM
      # DNS records to add. Runs only when resend_domain is supplied.
      - name: Resend domain setup
        if: ${{ inputs.resend_domain != '' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || inputs.resend_api_key }}
          DOMAIN: ${{ inputs.resend_domain }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "ERROR: no RESEND_API_KEY provided (input or secret)."; exit 1
          fi
          echo "::add-mask::$RESEND_API_KEY"
          api() { curl -sS -H "Authorization: Bearer $RESEND_API_KEY" -H "Content-Type: application/json" "$@"; }

          echo "Looking for existing domain $DOMAIN…"
          LIST=$(api "https://api.resend.com/domains")

          # ---- FORENSICS: every domain entry, to catch duplicates / region drift ----
          echo "=== ALL RESEND DOMAIN ENTRIES (duplicate + region check) ==="
          echo "$LIST" | jq -r '.data[]? | "DOMAIN_ENTRY name=\(.name) id=\(.id) region=\(.region // "?") status=\(.status // "?") created=\(.created_at // "?")"'
          MATCH_COUNT=$(echo "$LIST" | jq -r --arg d "$DOMAIN" '[.data[]? | select(.name==$d)] | length')
          echo "MATCHING_ENTRIES_FOR_${DOMAIN}=$MATCH_COUNT"
          if [ "$MATCH_COUNT" -gt 1 ] 2>/dev/null; then
            echo "⚠ DUPLICATE: more than one Resend entry for $DOMAIN — verifying one while DNS may match another."
          fi
          echo "==========================================================="

          DOMAIN_ID=$(echo "$LIST" | jq -r --arg d "$DOMAIN" '.data[]? | select(.name==$d) | .id' | head -1)

          if [ -z "$DOMAIN_ID" ] || [ "$DOMAIN_ID" = "null" ]; then
            echo "Creating it (region eu-west-1)…"
            CREATE=$(api -X POST "https://api.resend.com/domains" -d "{\"name\":\"$DOMAIN\",\"region\":\"eu-west-1\"}")
            DOMAIN_ID=$(echo "$CREATE" | jq -r '.id')
          fi
          if [ -z "$DOMAIN_ID" ] || [ "$DOMAIN_ID" = "null" ]; then
            echo "ERROR: could not create/find domain. Raw:"; echo "$LIST" | head -c 500; exit 1
          fi

          # Ask Resend to (re)verify, then print current records + status.
          VRESP=$(api -X POST "https://api.resend.com/domains/$DOMAIN_ID/verify")
          echo "VERIFY_RESP=$(echo "$VRESP" | head -c 300)"
          DETAIL=$(api "https://api.resend.com/domains/$DOMAIN_ID")
          STATUS=$(echo "$DETAIL" | jq -r '.status')
          echo "DOMAIN_ID=$DOMAIN_ID"
          echo "REGION=$(echo "$DETAIL" | jq -r '.region // "?"')"

          # ---- FORENSICS: compare the EXACT DKIM value Resend expects vs what is
          # actually published in DNS (byte-for-byte). A mismatch = perpetual pending.
          EXP_DKIM=$(echo "$DETAIL" | jq -r '.records[]? | select(.type=="TXT" and (.name|test("_domainkey"))) | .value' | head -1)
          DKIM_HOST=$(echo "$DETAIL" | jq -r '.records[]? | select(.type=="TXT" and (.name|test("_domainkey"))) | .name' | head -1)
          PUB_DKIM=$(command dig +short TXT "${DKIM_HOST}.${DOMAIN}" @8.8.8.8 2>/dev/null | tr -d '"' | tr -d '\n' | tr -d ' ')
          EXP_DKIM_NS=$(printf '%s' "$EXP_DKIM" | tr -d ' ')
          echo "---- DKIM byte-compare ----"
          echo "DKIM_EXPECTED_LEN=${#EXP_DKIM_NS}  DKIM_PUBLISHED_LEN=${#PUB_DKIM}"
          if [ -n "$PUB_DKIM" ] && [ "$EXP_DKIM_NS" = "$PUB_DKIM" ]; then
            echo "DKIM_MATCH=EXACT ✓ (published value equals what Resend expects)"
          else
            echo "DKIM_MATCH=DIFFERENT ✗"
            echo "DKIM_EXPECTED_HEAD=$(printf '%s' "$EXP_DKIM_NS" | head -c 80)"
            echo "DKIM_PUBLISHED_HEAD=$(printf '%s' "$PUB_DKIM" | head -c 80)"
          fi
          echo "---------------------------"
          echo ""
          echo "========================================="
          echo "DOMAIN: $DOMAIN   STATUS: $STATUS"
          echo "Add EACH record below at your DNS host:"
          echo "========================================="
          echo "$DETAIL" | jq -r '.records[] | "----\nTYPE:     \(.type)\nNAME:     \(.name)\nVALUE:    \(.value)\nPRIORITY: \(.priority // "-")\nTTL:      \(.ttl // "Auto")\nRECORD STATUS: \(.status // "?")"'
          echo "========================================="
          # Compact per-record verdict so a small log tail reveals which record
          # (DKIM / SPF / MX) is still missing from DNS.
          echo "RESEND_DOMAIN_STATUS=$STATUS"
          echo "$DETAIL" | jq -r '.records[] | "RESEND_RECORD \(.type) \(.name) -> \(.status // "?")"'
          echo "========================================="

      # When the domain runs on Vercel nameservers, records added at the
      # registrar (IONOS etc.) never take effect — Vercel is authoritative.
      # This writes the exact Resend DKIM/SPF/MX records straight into Vercel
      # DNS via the API, idempotently (skips any that already exist).
      - name: Configure Vercel DNS
        if: ${{ inputs.configure_vercel_dns == 'true' && inputs.resend_domain != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || inputs.resend_api_key }}
          DOMAIN: ${{ inputs.resend_domain }}
        run: |
          [ -z "$VERCEL_TOKEN" ] && { echo "ERROR: VERCEL_TOKEN missing."; exit 1; }
          [ -z "$RESEND_API_KEY" ] && { echo "ERROR: RESEND_API_KEY missing."; exit 1; }
          echo "::add-mask::$VERCEL_TOKEN"; echo "::add-mask::$RESEND_API_KEY"
          rapi() { curl -sS -H "Authorization: Bearer $RESEND_API_KEY" -H "Content-Type: application/json" "$@"; }
          vapi() { curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" "$@"; }

          # Resolve the account scope (personal or team) that actually owns the
          # domain by probing each scope's DNS records endpoint.
          SCOPE=""
          if vapi "https://api.vercel.com/v4/domains/$DOMAIN/records?limit=1" | jq -e '.records' >/dev/null 2>&1; then
            SCOPE=""
          else
            for tid in $(vapi "https://api.vercel.com/v2/teams?limit=100" | jq -r '.teams[]?.id'); do
              if vapi "https://api.vercel.com/v4/domains/$DOMAIN/records?limit=1&teamId=$tid" | jq -e '.records' >/dev/null 2>&1; then
                SCOPE="&teamId=$tid"; SCOPE_POST="?teamId=$tid"; break
              fi
            done
          fi
          [ -n "$SCOPE" ] && Q="$SCOPE_POST" || Q=""
          echo "Vercel scope resolved: ${SCOPE:-personal}"

          # Pull the exact records Resend wants.
          DOMAIN_ID=$(rapi "https://api.resend.com/domains" | jq -r --arg d "$DOMAIN" '.data[]? | select(.name==$d) | .id' | head -1)
          DETAIL=$(rapi "https://api.resend.com/domains/$DOMAIN_ID")
          EXISTING=$(vapi "https://api.vercel.com/v4/domains/$DOMAIN/records?limit=100${SCOPE}")

          echo "$DETAIL" | jq -c '.records[]' | while read -r rec; do
            RTYPE=$(echo "$rec" | jq -r '.type')
            # Vercel "name" is the host relative to the domain. Resend gives the
            # subdomain label already (e.g. "resend._domainkey" / "send").
            RNAME=$(echo "$rec" | jq -r '.name')
            RVALUE=$(echo "$rec" | jq -r '.value')
            RPRIO=$(echo "$rec" | jq -r '.priority // empty')

            # Skip if an equivalent record already exists.
            if echo "$EXISTING" | jq -e --arg n "$RNAME" --arg t "$RTYPE" '.records[]? | select(.name==$n and .type==$t)' >/dev/null 2>&1; then
              echo "VERCEL_DNS skip $RTYPE $RNAME (already present)"
              continue
            fi

            if [ "$RTYPE" = "MX" ]; then
              BODY=$(jq -n --arg n "$RNAME" --arg v "$RVALUE" --argjson p "${RPRIO:-10}" '{type:"MX",name:$n,value:$v,ttl:60,mxPriority:$p}')
            else
              BODY=$(jq -n --arg n "$RNAME" --arg t "$RTYPE" --arg v "$RVALUE" '{type:$t,name:$n,value:$v,ttl:60}')
            fi
            RESP=$(vapi -X POST "https://api.vercel.com/v2/domains/$DOMAIN/records${Q}" -d "$BODY")
            if echo "$RESP" | jq -e '.uid // .created' >/dev/null 2>&1; then
              echo "VERCEL_DNS added $RTYPE $RNAME"
            else
              echo "VERCEL_DNS FAILED $RTYPE $RNAME -> $(echo "$RESP" | head -c 300)"
            fi
          done
          echo "========================================="

      - name: Deploy to Vercel
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # Each key: GitHub Secret takes priority, manual input is the fallback.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || inputs.gemini_api_key }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || inputs.supabase_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || inputs.supabase_anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || inputs.supabase_service_role_key }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || inputs.site_url }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || inputs.resend_api_key }}
          MAIL_FROM: ${{ secrets.MAIL_FROM || inputs.mail_from }}
          ADMIN_NOTIFY_EMAIL: ${{ secrets.ADMIN_NOTIFY_EMAIL || inputs.admin_notify_email }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS || inputs.admin_emails }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || inputs.stripe_secret_key }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || inputs.stripe_webhook_secret }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || inputs.supabase_access_token }}
          # Project ref is public (it's in the project URL), so it has a safe
          # built-in fallback — this guarantees the Supabase key auto-fetch runs
          # on every deploy even when no secret/input is supplied.
          SUPABASE_REF: ${{ secrets.SUPABASE_REF || inputs.supabase_ref || 'ratyazffxlppzurfokxp' }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN secret is not set."
            echo "Add it at: github.com/mandmautoperformance-jpg/mandmautoperformance.com/settings/secrets/actions"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          [ -n "$SUPABASE_ACCESS_TOKEN" ] && echo "::add-mask::$SUPABASE_ACCESS_TOKEN"

          # If a Supabase personal access token is supplied, fetch the project's
          # anon + service_role keys (and URL) straight from the Management API.
          # The GitHub runner has open internet, so this works even when keys were
          # never copied by hand. Values already provided above take priority.
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_REF" ]; then
            echo "Resolving Supabase keys for project $SUPABASE_REF via Management API…"
            KEYS_JSON=$(curl -sS \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/$SUPABASE_REF/api-keys?reveal=true")
            FETCHED_ANON=$(echo "$KEYS_JSON" | jq -r '.[] | select(.name=="anon") | .api_key' 2>/dev/null)
            FETCHED_SERVICE=$(echo "$KEYS_JSON" | jq -r '.[] | select(.name=="service_role") | .api_key' 2>/dev/null)

            if [ -n "$FETCHED_ANON" ] && [ "$FETCHED_ANON" != "null" ]; then
              echo "::add-mask::$FETCHED_ANON"
              [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && NEXT_PUBLIC_SUPABASE_ANON_KEY="$FETCHED_ANON"
              echo "✓ anon key resolved"
            else
              echo "⚠ Could not resolve anon key — response: $(echo "$KEYS_JSON" | head -c 200)"
            fi
            if [ -n "$FETCHED_SERVICE" ] && [ "$FETCHED_SERVICE" != "null" ]; then
              echo "::add-mask::$FETCHED_SERVICE"
              [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && SUPABASE_SERVICE_ROLE_KEY="$FETCHED_SERVICE"
              echo "✓ service_role key resolved"
            else
              echo "⚠ Could not resolve service_role key"
            fi
            # Derive the project URL from the ref if not explicitly provided.
            [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] && NEXT_PUBLIC_SUPABASE_URL="https://$SUPABASE_REF.supabase.co"
          fi

          # If the Stripe step just created a webhook, use its fresh signing
          # secret whenever one wasn't already supplied via vault/input.
          STRIPE_WEBHOOK_SECRET="${STRIPE_WEBHOOK_SECRET:-$STRIPE_WEBHOOK_SECRET_RESOLVED}"

          [ -n "$GEMINI_API_KEY" ] && echo "::add-mask::$GEMINI_API_KEY"
          [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && echo "::add-mask::$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && echo "::add-mask::$SUPABASE_SERVICE_ROLE_KEY"
          [ -n "$RESEND_API_KEY" ] && echo "::add-mask::$RESEND_API_KEY"
          [ -n "$STRIPE_SECRET_KEY" ] && echo "::add-mask::$STRIPE_SECRET_KEY"
          [ -n "$STRIPE_WEBHOOK_SECRET" ] && echo "::add-mask::$STRIPE_WEBHOOK_SECRET"

          npm install -g vercel@latest

          # Inject every key that has a value — whether from secrets or inputs.
          # Keys already saved in the Vercel dashboard are picked up automatically
          # by Vercel itself; this covers everything stored on the GitHub side.
          ENV_ARGS=()
          add_env() {
            local name="$1"; local val="$2"
            if [ -n "$val" ]; then
              ENV_ARGS+=("--env" "$name=$val" "--build-env" "$name=$val")
            fi
          }
          add_env GEMINI_API_KEY "$GEMINI_API_KEY"
          add_env NEXT_PUBLIC_SUPABASE_URL "$NEXT_PUBLIC_SUPABASE_URL"
          add_env NEXT_PUBLIC_SUPABASE_ANON_KEY "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          add_env SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
          add_env NEXT_PUBLIC_SITE_URL "$NEXT_PUBLIC_SITE_URL"
          add_env RESEND_API_KEY "$RESEND_API_KEY"
          add_env MAIL_FROM "$MAIL_FROM"
          add_env ADMIN_NOTIFY_EMAIL "$ADMIN_NOTIFY_EMAIL"
          add_env ADMIN_EMAILS "$ADMIN_EMAILS"
          add_env STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY"
          add_env STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET"

          echo "Deploying to production..."
          OUTPUT=$(vercel deploy --prod --yes --token="$TOKEN" "${ENV_ARGS[@]}" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE "https://[a-zA-Z0-9._-]+\.vercel\.app" | tail -1)
          echo ""
          echo "========================================="
          echo "LIVE URL: ${URL:-see output above}"
          echo "Aliased:  https://mandmautoperformance.com"
          echo "========================================="

      # After deploy, prove the email pipeline end-to-end by calling the
      # self-test endpoint on the live site. Sends one branded test email to the
      # business inbox and prints exactly what Resend reported.
      - name: Email self-test
        if: ${{ inputs.run_email_test == 'true' }}
        env:
          EMAIL_TEST_TOKEN: ${{ secrets.EMAIL_TEST_TOKEN || inputs.email_test_token }}
        run: |
          # Give the new deploy a moment to become the live alias.
          sleep 20
          TOKEN_Q=""
          [ -n "$EMAIL_TEST_TOKEN" ] && TOKEN_Q="?token=$EMAIL_TEST_TOKEN"
          echo "Calling https://mandmautoperformance.com/api/email-selftest …"
          RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            "https://mandmautoperformance.com/api/email-selftest${TOKEN_Q}" || true)
          echo ""
          echo "========================================="
          echo "EMAIL SELF-TEST RESULT:"
          echo "$RESP"
          echo "========================================="
          echo "$RESP" | grep -q '"sent":true' \
            && echo "✓ Email sent — check mandmautoperformance@gmail.com" \
            || echo "✗ Email NOT sent — see reason above (likely RESEND_API_KEY missing in Vercel)"

          # Fire a REAL contact-form submission end-to-end: this exercises the
          # DB save (contact_messages) AND the owner-notification email exactly
          # as a customer would, then reports the live API's response.
          echo ""
          echo "→ Submitting a live test enquiry to /api/contact …"
          CRESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://mandmautoperformance.com/api/contact" \
            -H "Content-Type: application/json" \
            -d '{"name":"M&M Self-Test","email":"selftest@mandmautoperformance.com","subject":"support","message":"Automated end-to-end test of the contact form. I need a new tyre."}' || true)
          echo "========================================="
          echo "CONTACT FORM TEST RESULT:"
          echo "$CRESP"
          echo "========================================="
          echo "$CRESP" | grep -q '"success":true' \
            && echo "✓ Contact form accepted the enquiry (saved + emailed)." \
            || echo "✗ Contact form returned an error — see above."

      # Prove MIA (Gemini) actually answers on the live site by sending her a
      # real message and inspecting the streamed reply.
      - name: Verify live (MIA + Stripe)
        if: ${{ inputs.verify_live == 'true' }}
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || inputs.stripe_secret_key }}
        run: |
          sleep 5
          echo "→ Asking MIA a question on the live site…"
          MIA=$(curl -sS -m 40 -X POST "https://mandmautoperformance.com/api/chat/completions" \
            -H "Content-Type: application/json" \
            -d '{"message":"In one short sentence, recommend a car for a wedding."}' || true)
          echo "----- raw MIA stream (first 600 chars) -----"
          echo "$MIA" | head -c 600; echo
          echo "--------------------------------------------"
          if echo "$MIA" | grep -q '"type":"complete"'; then
            echo "✓ MIA is LIVE — Gemini answered."
          elif echo "$MIA" | grep -qi 'not configured\|GEMINI_API_KEY'; then
            echo "✗ MIA reached but Gemini key missing in the live build."
          else
            echo "⚠ MIA response inconclusive — check the raw stream above."
          fi

          echo ""
          echo "→ Confirming the Stripe webhook is registered…"
          if [ -n "$STRIPE_SECRET_KEY" ]; then
            echo "::add-mask::$STRIPE_SECRET_KEY"
            HOOKS=$(curl -sS https://api.stripe.com/v1/webhook_endpoints -u "$STRIPE_SECRET_KEY:" || true)
            COUNT=$(echo "$HOOKS" | jq -r --arg u "https://mandmautoperformance.com/api/payments/webhook" '[.data[]? | select(.url==$u)] | length')
            if [ "$COUNT" -ge 1 ] 2>/dev/null; then
              echo "✓ Stripe webhook registered ($COUNT endpoint) — payments will confirm."
            else
              echo "⚠ No Stripe webhook found for the payments URL yet."
            fi
          else
            echo "⚠ No Stripe key available to check the webhook."
          fi

      # Authoritative public-DNS check for the Resend sending domain. Runs on
      # the GitHub runner (open internet) so it sees exactly what the world sees.
      # Printed LAST so a tiny log tail reveals whether IONOS has published the
      # DKIM / SPF / MX records yet — distinguishing "still propagating" from
      # "record saved wrong". Non-fatal.
      - name: DNS resolve check
        if: ${{ inputs.resend_domain != '' }}
        env:
          DOMAIN: ${{ inputs.resend_domain }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || inputs.resend_api_key }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || inputs.supabase_access_token }}
          SUPABASE_REF: ${{ secrets.SUPABASE_REF || inputs.supabase_ref || 'ratyazffxlppzurfokxp' }}
        run: |
          # FORENSICS: read the LIVE Supabase auth config so we know exactly what
          # is sending confirmation emails right now (sender, host, confirm flag).
          if [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::add-mask::$SUPABASE_ACCESS_TOKEN"
            AUTH=$(curl -sS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" "https://api.supabase.com/v1/projects/$SUPABASE_REF/config/auth")
            echo "SUPA_smtp_host=$(echo "$AUTH" | jq -r '.smtp_host // "(none)"')"
            echo "SUPA_smtp_admin_email=$(echo "$AUTH" | jq -r '.smtp_admin_email // "(none)"')"
            echo "SUPA_smtp_sender_name=$(echo "$AUTH" | jq -r '.smtp_sender_name // "(none)"')"
            echo "SUPA_external_email_enabled=$(echo "$AUTH" | jq -r '.external_email_enabled // "?"')"
            echo "SUPA_mailer_autoconfirm=$(echo "$AUTH" | jq -r '.mailer_autoconfirm // "?"')"
            echo "SUPA_rate_limit_email_sent=$(echo "$AUTH" | jq -r '.rate_limit_email_sent // "?"')"
          fi
          if [ -n "$RESEND_API_KEY" ]; then
            echo "::add-mask::$RESEND_API_KEY"
            RID=$(curl -sS -H "Authorization: Bearer $RESEND_API_KEY" "https://api.resend.com/domains" | jq -r --arg d "$DOMAIN" '.data[]? | select(.name==$d) | .id' | head -1)
            VRESP=$(curl -sS -X POST -H "Authorization: Bearer $RESEND_API_KEY" "https://api.resend.com/domains/$RID/verify" || true)
            DETAIL=$(curl -sS -H "Authorization: Bearer $RESEND_API_KEY" "https://api.resend.com/domains/$RID")
            echo "RESEND_FINAL_STATUS=$(echo "$DETAIL" | jq -r '.status')"
            echo "RESEND_VERIFY_RESP=$(echo "$VRESP" | head -c 300)"
            echo "RESEND_DOMAIN_ID=$RID  REGION=$(echo "$DETAIL" | jq -r '.region // "?"')"
            echo "$DETAIL" | jq -r '.records[]? | "RESEND_REC \(.record // .type) name=\(.name) status=\(.status // "?")"'
            # FORENSICS: duplicate-entry + region drift detection
            FULL=$(curl -sS -H "Authorization: Bearer $RESEND_API_KEY" "https://api.resend.com/domains")
            echo "$FULL" | jq -r '.data[]? | "DOMAIN_ENTRY name=\(.name) id=\(.id) region=\(.region // "?") status=\(.status // "?")"'
            echo "MATCHING_ENTRIES=$(echo "$FULL" | jq -r --arg d "$DOMAIN" '[.data[]? | select(.name==$d)] | length')"
            # FORENSICS: byte-compare expected DKIM value vs published TXT
            EXP=$(echo "$DETAIL" | jq -r '.records[]? | select(.type=="TXT" and (.name|test("_domainkey"))) | .value' | head -1 | tr -d ' ')
            PUB=$(command dig +short TXT "resend._domainkey.$DOMAIN" @8.8.8.8 2>/dev/null | tr -d '"' | tr -d '\n' | tr -d ' ')
            echo "DKIM_EXPECTED_LEN=${#EXP} DKIM_PUBLISHED_LEN=${#PUB}"
            if [ -n "$PUB" ] && [ "$EXP" = "$PUB" ]; then echo "DKIM_MATCH=EXACT"; else echo "DKIM_MATCH=DIFFERENT"; echo "EXP_HEAD=$(printf '%s' "$EXP"|head -c 60)"; echo "PUB_HEAD=$(printf '%s' "$PUB"|head -c 60)"; fi
          fi
          dig() { command dig "$@"; }
          chk() {
            local type="$1"; local host="$2"; local want="$3"
            local got
            got=$(command dig +short "$type" "$host" @8.8.8.8 2>/dev/null | tr -d '"' | tr '\n' ' ')
            if [ -z "$got" ]; then
              echo "DNS_RESULT $type $host -> EMPTY (not published yet)"
            elif [ -n "$want" ] && echo "$got" | grep -qiF "$want"; then
              echo "DNS_RESULT $type $host -> OK ($got)"
            else
              echo "DNS_RESULT $type $host -> PRESENT ($got)"
            fi
          }
          echo "========================================="
          echo "PUBLIC DNS CHECK for $DOMAIN (via 8.8.8.8)"
          echo "NS_RESULT $(command dig +short NS "$DOMAIN" @8.8.8.8 2>/dev/null | tr '\n' ' ')"
          echo "--- expected (correct host names) ---"
          chk TXT "resend._domainkey.$DOMAIN" "p="
          chk TXT "send.$DOMAIN" "v=spf1"
          chk MX  "send.$DOMAIN" "amazonses"
          echo "--- double-domain trap (IONOS auto-append) ---"
          chk TXT "resend._domainkey.$DOMAIN.$DOMAIN" "p="
          chk TXT "send.$DOMAIN.$DOMAIN" "v=spf1"
          chk MX  "send.$DOMAIN.$DOMAIN" "amazonses"
          echo "========================================="
