name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      vercel_token:
        description: 'Vercel Auth Token'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Deploy to Vercel
        run: |
          TOKEN="${{ inputs.vercel_token || secrets.VERCEL_TOKEN }}"
          echo "::add-mask::$TOKEN"
          npm install -g vercel@latest
          OUTPUT=$(vercel deploy --yes --prod --token="$TOKEN" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE "https://[a-zA-Z0-9._-]+\.vercel\.app" | tail -1)
          if [ -n "$URL" ]; then
            echo ""
            echo "========================================="
            echo "LIVE PREVIEW URL: $URL"
            echo "========================================="
          fi
