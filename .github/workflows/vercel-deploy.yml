name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      gemini_api_key:
        description: 'GEMINI_API_KEY (optional — leave blank if already set in Vercel dashboard)'
        required: false
        type: string
      supabase_url:
        description: 'NEXT_PUBLIC_SUPABASE_URL (optional)'
        required: false
        type: string
      supabase_anon_key:
        description: 'NEXT_PUBLIC_SUPABASE_ANON_KEY (optional)'
        required: false
        type: string
      supabase_service_role_key:
        description: 'SUPABASE_SERVICE_ROLE_KEY (optional)'
        required: false
        type: string
      site_url:
        description: 'NEXT_PUBLIC_SITE_URL (optional)'
        required: false
        type: string
      resend_api_key:
        description: 'RESEND_API_KEY (optional — enables booking/contact email notifications)'
        required: false
        type: string
      mail_from:
        description: 'MAIL_FROM (optional — verified sender, e.g. "M&M Auto Performance <bookings@mandmautoperformance.com>")'
        required: false
        type: string
      admin_notify_email:
        description: 'ADMIN_NOTIFY_EMAIL (optional — where booking notifications go; defaults to mandmautoperformance@gmail.com)'
        required: false
        type: string
      supabase_access_token:
        description: 'SUPABASE_ACCESS_TOKEN (sbp_… personal access token — runner auto-fetches anon + service_role keys)'
        required: false
        type: string
      supabase_ref:
        description: 'Supabase project ref (e.g. ratyazffxlppzurfokxp) — required when using the access token'
        required: false
        type: string
      resend_domain:
        description: 'Register this sending domain with Resend and print its DNS records (e.g. mandmautoperformance.com)'
        required: false
        type: string
      run_email_test:
        description: 'After deploy, send a branded test email to the business inbox and print the result (true/false)'
        required: false
        type: string
      email_test_token:
        description: 'EMAIL_TEST_TOKEN — only needed if the self-test endpoint is token-gated'
        required: false
        type: string
      configure_supabase:
        description: 'Route Supabase auth emails through Resend SMTP + apply pending DB migrations (true/false)'
        required: false
        type: string
      smtp_sender_email:
        description: 'SMTP sender (verified Resend sender). Default onboarding@resend.dev works immediately.'
        required: false
        type: string
      admin_emails:
        description: 'ADMIN_EMAILS — comma-separated allowlist that unlocks /admin-dashboard + /api/admin/*'
        required: false
        type: string
      stripe_secret_key:
        description: 'STRIPE_SECRET_KEY (sk_test_… or sk_live_…)'
        required: false
        type: string
      stripe_webhook_secret:
        description: 'STRIPE_WEBHOOK_SECRET (whsec_…)'
        required: false
        type: string
      configure_stripe:
        description: 'Auto-create the Stripe webhook endpoint and inject its signing secret (true/false)'
        required: false
        type: string
      verify_live:
        description: 'After deploy, hit the live site to confirm MIA (Gemini) and key endpoints respond (true/false)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Route Supabase Auth emails (confirmation, password reset) through the
      # Resend SMTP server instead of Supabase's shared mailer, and apply the
      # account-ID-verification migration. Both go through the Management API —
      # no dashboard clicking. Idempotent; runs only when configure_supabase=true.
      - name: Configure Supabase (SMTP + migrations)
        if: ${{ inputs.configure_supabase == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || inputs.supabase_access_token }}
          SUPABASE_REF: ${{ secrets.SUPABASE_REF || inputs.supabase_ref || 'ratyazffxlppzurfokxp' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || inputs.resend_api_key }}
          SENDER_EMAIL: ${{ inputs.smtp_sender_email }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ERROR: no SUPABASE_ACCESS_TOKEN (secret or input)."; exit 1
          fi
          if [ -z "$RESEND_API_KEY" ]; then
            echo "ERROR: no RESEND_API_KEY (secret or input) — needed as the SMTP password."; exit 1
          fi
          echo "::add-mask::$SUPABASE_ACCESS_TOKEN"
          echo "::add-mask::$RESEND_API_KEY"
          SENDER_EMAIL="${SENDER_EMAIL:-onboarding@resend.dev}"

          echo "→ Pointing Supabase Auth SMTP at smtp.resend.com (sender: $SENDER_EMAIL)…"
          SMTP_PAYLOAD=$(jq -n \
            --arg pass "$RESEND_API_KEY" --arg email "$SENDER_EMAIL" \
            '{
              external_email_enabled: true,
              smtp_admin_email: $email,
              smtp_host: "smtp.resend.com",
              smtp_port: "465",
              smtp_user: "resend",
              smtp_pass: $pass,
              smtp_sender_name: "M&M Auto Performance",
              smtp_max_frequency: 5
            }')
          SMTP_RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X PATCH \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" -d "$SMTP_PAYLOAD" \
            "https://api.supabase.com/v1/projects/$SUPABASE_REF/config/auth")
          SMTP_CODE=$(echo "$SMTP_RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          if [ "$SMTP_CODE" = "200" ]; then
            echo "✓ Custom SMTP set — auth emails now come from Resend."
          else
            echo "✗ SMTP config failed (HTTP $SMTP_CODE):"
            echo "$SMTP_RESP" | sed 's/HTTP_STATUS:[0-9]*//' | head -c 600; exit 1
          fi

          echo "→ Applying migration 005 (user_id_uploads + storage bucket)…"
          MIG_PAYLOAD=$(jq -Rs '{query: .}' < supabase/migrations/005_account_id_verification.sql)
          MIG_RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" -d "$MIG_PAYLOAD" \
            "https://api.supabase.com/v1/projects/$SUPABASE_REF/database/query")
          MIG_CODE=$(echo "$MIG_RESP" | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
          if [ "$MIG_CODE" = "200" ] || [ "$MIG_CODE" = "201" ]; then
            echo "✓ Migration applied — ID upload flow has its table."
          else
            echo "✗ Migration failed (HTTP $MIG_CODE):"
            echo "$MIG_RESP" | sed 's/HTTP_STATUS:[0-9]*//' | head -c 600; exit 1
          fi

      # Auto-provision the Stripe webhook endpoint using the secret key already in
      # the vault, and capture its signing secret (whsec_) so payments verify.
      # Runs before the deploy so the secret can be injected into the build.
      # The signing secret is only returned by Stripe on CREATE, so we remove any
      # existing endpoint for this URL first, then recreate to capture a fresh one.
      - name: Configure Stripe webhook
        if: ${{ inputs.configure_stripe == 'true' }}
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || inputs.stripe_secret_key }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "ERROR: no STRIPE_SECRET_KEY (vault secret or input)."; exit 1
          fi
          echo "::add-mask::$STRIPE_SECRET_KEY"
          URL="https://mandmautoperformance.com/api/payments/webhook"

          echo "→ Looking for an existing webhook for $URL …"
          LIST=$(curl -sS https://api.stripe.com/v1/webhook_endpoints -u "$STRIPE_SECRET_KEY:")
          EXISTING=$(echo "$LIST" | jq -r --arg u "$URL" '.data[]? | select(.url==$u) | .id')
          for id in $EXISTING; do
            echo "  removing old endpoint $id (so we can capture a fresh signing secret)…"
            curl -sS -X DELETE "https://api.stripe.com/v1/webhook_endpoints/$id" -u "$STRIPE_SECRET_KEY:" >/dev/null || true
          done

          echo "→ Creating webhook endpoint…"
          CREATE=$(curl -sS https://api.stripe.com/v1/webhook_endpoints -u "$STRIPE_SECRET_KEY:" \
            -d "url=$URL" \
            -d "enabled_events[]=checkout.session.completed" \
            -d "enabled_events[]=payment_intent.succeeded")
          WHSEC=$(echo "$CREATE" | jq -r '.secret // empty')
          if [ -z "$WHSEC" ]; then
            echo "✗ Could not create webhook. Stripe said:"
            echo "$CREATE" | jq -r '.error.message // .' | head -c 500; exit 1
          fi
          echo "::add-mask::$WHSEC"
          # Hand the secret to the deploy step (different name avoids clobbering the
          # YAML env expression, which would otherwise overwrite it with empty).
          echo "STRIPE_WEBHOOK_SECRET_RESOLVED=$WHSEC" >> "$GITHUB_ENV"
          echo "✓ Stripe webhook live: $URL (events: checkout.session.completed, payment_intent.succeeded)"

      # Optional: register a sending domain with Resend and print the SPF/DKIM
      # DNS records to add. Runs only when resend_domain is supplied.
      - name: Resend domain setup
        if: ${{ inputs.resend_domain != '' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || inputs.resend_api_key }}
          DOMAIN: ${{ inputs.resend_domain }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "ERROR: no RESEND_API_KEY provided (input or secret)."; exit 1
          fi
          echo "::add-mask::$RESEND_API_KEY"
          api() { curl -sS -H "Authorization: Bearer $RESEND_API_KEY" -H "Content-Type: application/json" "$@"; }

          echo "Looking for existing domain $DOMAIN…"
          LIST=$(api "https://api.resend.com/domains")
          DOMAIN_ID=$(echo "$LIST" | jq -r --arg d "$DOMAIN" '.data[]? | select(.name==$d) | .id' | head -1)

          if [ -z "$DOMAIN_ID" ] || [ "$DOMAIN_ID" = "null" ]; then
            echo "Creating it (region eu-west-1)…"
            CREATE=$(api -X POST "https://api.resend.com/domains" -d "{\"name\":\"$DOMAIN\",\"region\":\"eu-west-1\"}")
            DOMAIN_ID=$(echo "$CREATE" | jq -r '.id')
          fi
          if [ -z "$DOMAIN_ID" ] || [ "$DOMAIN_ID" = "null" ]; then
            echo "ERROR: could not create/find domain. Raw:"; echo "$LIST" | head -c 500; exit 1
          fi

          # Ask Resend to (re)verify, then print current records + status.
          api -X POST "https://api.resend.com/domains/$DOMAIN_ID/verify" >/dev/null || true
          DETAIL=$(api "https://api.resend.com/domains/$DOMAIN_ID")
          STATUS=$(echo "$DETAIL" | jq -r '.status')
          echo ""
          echo "========================================="
          echo "DOMAIN: $DOMAIN   STATUS: $STATUS"
          echo "Add EACH record below at your DNS host:"
          echo "========================================="
          echo "$DETAIL" | jq -r '.records[] | "----\nTYPE:     \(.type)\nNAME:     \(.name)\nVALUE:    \(.value)\nPRIORITY: \(.priority // "-")\nTTL:      \(.ttl // "Auto")"'
          echo "========================================="

      - name: Deploy to Vercel
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # Each key: GitHub Secret takes priority, manual input is the fallback.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || inputs.gemini_api_key }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || inputs.supabase_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || inputs.supabase_anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || inputs.supabase_service_role_key }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || inputs.site_url }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || inputs.resend_api_key }}
          MAIL_FROM: ${{ secrets.MAIL_FROM || inputs.mail_from }}
          ADMIN_NOTIFY_EMAIL: ${{ secrets.ADMIN_NOTIFY_EMAIL || inputs.admin_notify_email }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS || inputs.admin_emails }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || inputs.stripe_secret_key }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || inputs.stripe_webhook_secret }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || inputs.supabase_access_token }}
          # Project ref is public (it's in the project URL), so it has a safe
          # built-in fallback — this guarantees the Supabase key auto-fetch runs
          # on every deploy even when no secret/input is supplied.
          SUPABASE_REF: ${{ secrets.SUPABASE_REF || inputs.supabase_ref || 'ratyazffxlppzurfokxp' }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN secret is not set."
            echo "Add it at: github.com/mandmautoperformance-jpg/mandmautoperformance.com/settings/secrets/actions"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          [ -n "$SUPABASE_ACCESS_TOKEN" ] && echo "::add-mask::$SUPABASE_ACCESS_TOKEN"

          # If a Supabase personal access token is supplied, fetch the project's
          # anon + service_role keys (and URL) straight from the Management API.
          # The GitHub runner has open internet, so this works even when keys were
          # never copied by hand. Values already provided above take priority.
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_REF" ]; then
            echo "Resolving Supabase keys for project $SUPABASE_REF via Management API…"
            KEYS_JSON=$(curl -sS \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/$SUPABASE_REF/api-keys?reveal=true")
            FETCHED_ANON=$(echo "$KEYS_JSON" | jq -r '.[] | select(.name=="anon") | .api_key' 2>/dev/null)
            FETCHED_SERVICE=$(echo "$KEYS_JSON" | jq -r '.[] | select(.name=="service_role") | .api_key' 2>/dev/null)

            if [ -n "$FETCHED_ANON" ] && [ "$FETCHED_ANON" != "null" ]; then
              echo "::add-mask::$FETCHED_ANON"
              [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && NEXT_PUBLIC_SUPABASE_ANON_KEY="$FETCHED_ANON"
              echo "✓ anon key resolved"
            else
              echo "⚠ Could not resolve anon key — response: $(echo "$KEYS_JSON" | head -c 200)"
            fi
            if [ -n "$FETCHED_SERVICE" ] && [ "$FETCHED_SERVICE" != "null" ]; then
              echo "::add-mask::$FETCHED_SERVICE"
              [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && SUPABASE_SERVICE_ROLE_KEY="$FETCHED_SERVICE"
              echo "✓ service_role key resolved"
            else
              echo "⚠ Could not resolve service_role key"
            fi
            # Derive the project URL from the ref if not explicitly provided.
            [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] && NEXT_PUBLIC_SUPABASE_URL="https://$SUPABASE_REF.supabase.co"
          fi

          # If the Stripe step just created a webhook, use its fresh signing
          # secret whenever one wasn't already supplied via vault/input.
          STRIPE_WEBHOOK_SECRET="${STRIPE_WEBHOOK_SECRET:-$STRIPE_WEBHOOK_SECRET_RESOLVED}"

          [ -n "$GEMINI_API_KEY" ] && echo "::add-mask::$GEMINI_API_KEY"
          [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && echo "::add-mask::$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && echo "::add-mask::$SUPABASE_SERVICE_ROLE_KEY"
          [ -n "$RESEND_API_KEY" ] && echo "::add-mask::$RESEND_API_KEY"
          [ -n "$STRIPE_SECRET_KEY" ] && echo "::add-mask::$STRIPE_SECRET_KEY"
          [ -n "$STRIPE_WEBHOOK_SECRET" ] && echo "::add-mask::$STRIPE_WEBHOOK_SECRET"

          npm install -g vercel@latest

          # Inject every key that has a value — whether from secrets or inputs.
          # Keys already saved in the Vercel dashboard are picked up automatically
          # by Vercel itself; this covers everything stored on the GitHub side.
          ENV_ARGS=()
          add_env() {
            local name="$1"; local val="$2"
            if [ -n "$val" ]; then
              ENV_ARGS+=("--env" "$name=$val" "--build-env" "$name=$val")
            fi
          }
          add_env GEMINI_API_KEY "$GEMINI_API_KEY"
          add_env NEXT_PUBLIC_SUPABASE_URL "$NEXT_PUBLIC_SUPABASE_URL"
          add_env NEXT_PUBLIC_SUPABASE_ANON_KEY "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          add_env SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
          add_env NEXT_PUBLIC_SITE_URL "$NEXT_PUBLIC_SITE_URL"
          add_env RESEND_API_KEY "$RESEND_API_KEY"
          add_env MAIL_FROM "$MAIL_FROM"
          add_env ADMIN_NOTIFY_EMAIL "$ADMIN_NOTIFY_EMAIL"
          add_env ADMIN_EMAILS "$ADMIN_EMAILS"
          add_env STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY"
          add_env STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET"

          echo "Deploying to production..."
          OUTPUT=$(vercel deploy --prod --yes --token="$TOKEN" "${ENV_ARGS[@]}" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE "https://[a-zA-Z0-9._-]+\.vercel\.app" | tail -1)
          echo ""
          echo "========================================="
          echo "LIVE URL: ${URL:-see output above}"
          echo "Aliased:  https://mandmautoperformance.com"
          echo "========================================="

      # After deploy, prove the email pipeline end-to-end by calling the
      # self-test endpoint on the live site. Sends one branded test email to the
      # business inbox and prints exactly what Resend reported.
      - name: Email self-test
        if: ${{ inputs.run_email_test == 'true' }}
        env:
          EMAIL_TEST_TOKEN: ${{ secrets.EMAIL_TEST_TOKEN || inputs.email_test_token }}
        run: |
          # Give the new deploy a moment to become the live alias.
          sleep 20
          TOKEN_Q=""
          [ -n "$EMAIL_TEST_TOKEN" ] && TOKEN_Q="?token=$EMAIL_TEST_TOKEN"
          echo "Calling https://mandmautoperformance.com/api/email-selftest …"
          RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            "https://mandmautoperformance.com/api/email-selftest${TOKEN_Q}" || true)
          echo ""
          echo "========================================="
          echo "EMAIL SELF-TEST RESULT:"
          echo "$RESP"
          echo "========================================="
          echo "$RESP" | grep -q '"sent":true' \
            && echo "✓ Email sent — check mandmautoperformance@gmail.com" \
            || echo "✗ Email NOT sent — see reason above (likely RESEND_API_KEY missing in Vercel)"

      # Prove MIA (Gemini) actually answers on the live site by sending her a
      # real message and inspecting the streamed reply.
      - name: Verify live (MIA + Stripe)
        if: ${{ inputs.verify_live == 'true' }}
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || inputs.stripe_secret_key }}
        run: |
          sleep 5
          echo "→ Asking MIA a question on the live site…"
          MIA=$(curl -sS -m 40 -X POST "https://mandmautoperformance.com/api/chat/completions" \
            -H "Content-Type: application/json" \
            -d '{"message":"In one short sentence, recommend a car for a wedding."}' || true)
          echo "----- raw MIA stream (first 600 chars) -----"
          echo "$MIA" | head -c 600; echo
          echo "--------------------------------------------"
          if echo "$MIA" | grep -q '"type":"complete"'; then
            echo "✓ MIA is LIVE — Gemini answered."
          elif echo "$MIA" | grep -qi 'not configured\|GEMINI_API_KEY'; then
            echo "✗ MIA reached but Gemini key missing in the live build."
          else
            echo "⚠ MIA response inconclusive — check the raw stream above."
          fi

          echo ""
          echo "→ Confirming the Stripe webhook is registered…"
          if [ -n "$STRIPE_SECRET_KEY" ]; then
            echo "::add-mask::$STRIPE_SECRET_KEY"
            HOOKS=$(curl -sS https://api.stripe.com/v1/webhook_endpoints -u "$STRIPE_SECRET_KEY:" || true)
            COUNT=$(echo "$HOOKS" | jq -r --arg u "https://mandmautoperformance.com/api/payments/webhook" '[.data[]? | select(.url==$u)] | length')
            if [ "$COUNT" -ge 1 ] 2>/dev/null; then
              echo "✓ Stripe webhook registered ($COUNT endpoint) — payments will confirm."
            else
              echo "⚠ No Stripe webhook found for the payments URL yet."
            fi
          else
            echo "⚠ No Stripe key available to check the webhook."
          fi
