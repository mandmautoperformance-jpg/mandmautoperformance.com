name: Resend Domain Setup

# One-off helper: registers your sending domain with Resend and prints the exact
# DNS records you need to add. Runs on the GitHub runner (open internet), so it
# works even though the dev sandbox can't reach api.resend.com.

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Sending domain, e.g. mandmautoperformance.com'
        required: true
        type: string
      region:
        description: 'Resend region (eu-west-1 for UK/Ireland)'
        required: false
        default: 'eu-west-1'
        type: string
      resend_api_key:
        description: 'RESEND_API_KEY (leave blank if stored as a secret)'
        required: false
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Register domain with Resend and print DNS records
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || inputs.resend_api_key }}
          DOMAIN: ${{ inputs.domain }}
          REGION: ${{ inputs.region }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "ERROR: no RESEND_API_KEY provided (input or secret)."
            exit 1
          fi
          echo "::add-mask::$RESEND_API_KEY"

          api() { curl -sS -H "Authorization: Bearer $RESEND_API_KEY" -H "Content-Type: application/json" "$@"; }

          echo "Looking for existing domain $DOMAIN…"
          LIST=$(api "https://api.resend.com/domains")
          DOMAIN_ID=$(echo "$LIST" | jq -r --arg d "$DOMAIN" '.data[]? | select(.name==$d) | .id' | head -1)

          if [ -z "$DOMAIN_ID" ] || [ "$DOMAIN_ID" = "null" ]; then
            echo "Not found — creating it (region $REGION)…"
            CREATE=$(api -X POST "https://api.resend.com/domains" -d "{\"name\":\"$DOMAIN\",\"region\":\"$REGION\"}")
            DOMAIN_ID=$(echo "$CREATE" | jq -r '.id')
            RECORDS=$(echo "$CREATE" | jq -c '.records')
          fi

          if [ -z "$DOMAIN_ID" ] || [ "$DOMAIN_ID" = "null" ]; then
            echo "ERROR: could not create or find the domain. Raw response:"
            echo "$LIST" | head -c 500
            exit 1
          fi

          echo "Domain id: $DOMAIN_ID"
          DETAIL=$(api "https://api.resend.com/domains/$DOMAIN_ID")
          STATUS=$(echo "$DETAIL" | jq -r '.status')

          echo ""
          echo "========================================="
          echo "DOMAIN: $DOMAIN   STATUS: $STATUS"
          echo "Add EACH of these records at your DNS host:"
          echo "========================================="
          echo "$DETAIL" | jq -r '.records[] | "----\nTYPE:     \(.type)\nNAME:     \(.name)\nVALUE:    \(.value)\nPRIORITY: \(.priority // "-")\nTTL:      \(.ttl // "Auto")"'
          echo "========================================="
          echo "Once these are live, re-run with verify and Resend will flip STATUS to 'verified'."
