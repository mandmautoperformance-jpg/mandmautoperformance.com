<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="M&M Auto Performance">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E3CFA1"/>
      <stop offset="55%"  stop-color="#C5A572"/>
      <stop offset="100%" stop-color="#A9863F"/>
    </linearGradient>
    <radialGradient id="bg" cx="45%" cy="22%" r="82%">
      <stop offset="0%"   stop-color="#21242A"/>
      <stop offset="100%" stop-color="#0B0C0E"/>
    </radialGradient>
    <radialGradient id="gloss" cx="50%" cy="8%" r="52%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.09)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Base disc -->
  <circle cx="60" cy="60" r="59" fill="url(#bg)"/>

  <!-- Gold outer ring -->
  <circle cx="60" cy="60" r="57.5" fill="none" stroke="url(#gold)" stroke-width="2"/>

  <!-- Subtle inner hairline -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#C5A572" stroke-width="0.6" opacity="0.22"/>

  <!-- Soft gloss top -->
  <circle cx="60" cy="60" r="59" fill="url(#gloss)"/>

  <!-- M&M monogram — dominant, clean, legible at any size -->
  <text x="60" y="66"
    font-family="Georgia,'Palatino Linotype','Book Antiqua',serif"
    font-size="38" font-weight="700"
    text-anchor="middle"
    fill="url(#gold)"
    letter-spacing="1.5"
    paint-order="stroke"
    stroke="#0A0B0D"
    stroke-width="1.5">M&amp;M</text>

  <!-- Hairline rule -->
  <line x1="22" y1="79" x2="98" y2="79" stroke="#C5A572" stroke-width="0.8" opacity="0.40"/>

  <!-- Tagline — visible at medium/large sizes, becomes decorative texture at small -->
  <text x="60" y="91"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="7.5" font-weight="500"
    text-anchor="middle"
    fill="#C5A572"
    letter-spacing="3.5"
    opacity="0.85">AUTO PERFORMANCE</text>
</svg>
