<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-label="M&M Auto Performance UK">
  <defs>
    <!-- Deep piano-black disc -->
    <radialGradient id="disc" cx="50%" cy="32%" r="75%">
      <stop offset="0%"  stop-color="#262a2e"/>
      <stop offset="55%" stop-color="#0d0f11"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- Polished platinum ring -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="25%"  stop-color="#cfd6dc"/>
      <stop offset="50%"  stop-color="#7f878e"/>
      <stop offset="75%"  stop-color="#c2c9cf"/>
      <stop offset="100%" stop-color="#eef2f5"/>
    </linearGradient>
    <!-- Brushed platinum for the lettering — light, high-contrast, legible -->
    <linearGradient id="letters" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="42%"  stop-color="#e3e8ec"/>
      <stop offset="52%"  stop-color="#aeb6bd"/>
      <stop offset="62%"  stop-color="#e8edf1"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <!-- Gold hairline accent -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f7e4b0"/>
      <stop offset="50%"  stop-color="#caa14e"/>
      <stop offset="100%" stop-color="#f3dca0"/>
    </linearGradient>
    <!-- Soft top gloss -->
    <radialGradient id="gloss" cx="50%" cy="16%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Outer polished platinum rim -->
  <circle cx="110" cy="110" r="106" fill="url(#ring)"/>
  <circle cx="110" cy="110" r="99"  fill="#000000"/>
  <!-- Main disc -->
  <circle cx="110" cy="110" r="96"  fill="url(#disc)"/>
  <!-- Gold hairline ring -->
  <circle cx="110" cy="110" r="88"  fill="none" stroke="url(#gold)" stroke-width="1.4" opacity="0.9"/>

  <!-- M&M — clean, bold, wide-tracked for clarity -->
  <text x="110" y="120"
    font-family="'Trajan Pro','Georgia','Times New Roman',serif"
    font-size="74" font-weight="700" letter-spacing="2"
    text-anchor="middle"
    fill="url(#letters)"
    paint-order="stroke" stroke="#05070a" stroke-width="1"
  >M&amp;M</text>

  <!-- Divider lines flanking the tagline -->
  <line x1="44"  y1="150" x2="74"  y2="150" stroke="url(#gold)" stroke-width="1.2"/>
  <line x1="146" y1="150" x2="176" y2="150" stroke="url(#gold)" stroke-width="1.2"/>

  <!-- Tagline -->
  <text x="110" y="154"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="11" font-weight="600" letter-spacing="3.4"
    text-anchor="middle"
    fill="#e9edf0"
  >AUTO PERFORMANCE</text>
  <text x="110" y="172"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="10" font-weight="700" letter-spacing="6"
    text-anchor="middle"
    fill="url(#gold)"
  >UNITED KINGDOM</text>

  <!-- Top gloss highlight -->
  <ellipse cx="110" cy="74" rx="76" ry="40" fill="url(#gloss)"/>
</svg>
