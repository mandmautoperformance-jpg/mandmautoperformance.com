<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="M&amp;M Auto Performance">
  <defs>
    <radialGradient id="mm-disc" cx="38%" cy="26%" r="76%">
      <stop offset="0%" stop-color="#2c2f35"/>
      <stop offset="45%" stop-color="#131519"/>
      <stop offset="100%" stop-color="#07080a"/>
    </radialGradient>
    <linearGradient id="mm-rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#484c56"/>
      <stop offset="18%" stop-color="#0e0f12"/>
      <stop offset="82%" stop-color="#0b0c0f"/>
      <stop offset="100%" stop-color="#4c5059"/>
    </linearGradient>
    <linearGradient id="mm-chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="18%" stop-color="#eef2f6"/>
      <stop offset="42%" stop-color="#9aa3ac"/>
      <stop offset="50%" stop-color="#d6dde3"/>
      <stop offset="60%" stop-color="#6a7179"/>
