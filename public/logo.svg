  <text x="148" y="176"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900" font-size="80" text-anchor="middle"
    fill="url(#mm-chrome)">M</text>

  <circle cx="100" cy="100" r="88" fill="url(#mm-gloss)"/>
